name: Deploy to Production

on:
  push:
    branches: [prod]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android → Google Play Production
  # ─────────────────────────────────────────────────────────────
  android-prod:
    name: Android → Play Store Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JS dependencies
        run: npm ci

      # Decode the keystore stored as a base64 GitHub secret
      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/spectrum-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # versionCode and versionName come from build.gradle — bump them manually before pushing to prod
      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -PRELEASE_STORE_FILE=spectrum-release.keystore \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Upload to Play Store Production
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: care.spectrumclinics.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed

  # ─────────────────────────────────────────────────────────────
  # iOS → App Store
  # ─────────────────────────────────────────────────────────────
  ios-prod:
    name: iOS → App Store
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      # Import the Apple Distribution certificate into a temporary keychain
      - name: Import distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/ci.keychain
          KEYCHAIN_PASS=ci_build_$(date +%s)

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      # Install the App Store distribution provisioning profile
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' \
            /dev/stdin <<< "$(security cms -D -i /tmp/profile.mobileprovision)")
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Fix xcframework signatures
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Identity: '$IDENTITY'"

          echo "--- All xcframeworks found in repo ---"
          find . -name "*.xcframework" -type d 2>/dev/null | grep -v ".git"
          echo "--------------------------------------"

          find . -name "*.xcframework" -type d 2>/dev/null | grep -v ".git" | while read fw; do
            echo "=== $fw ==="
            codesign --remove-signature "$fw" 2>/dev/null || true
            find "$fw" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
            find "$fw" -name "*.framework" -type d | while read inner; do
              codesign --remove-signature "$inner" 2>/dev/null || true
              rm -rf "$inner/_CodeSignature" 2>/dev/null || true
              if [ -n "$IDENTITY" ]; then
                codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$inner" && echo "  Signed: $inner" || echo "  Failed: $inner"
              fi
            done
            if [ -n "$IDENTITY" ]; then
              codesign --force --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$fw" && echo "  Signed xcfw: $fw" || echo "  Failed xcfw: $fw"
            fi
            echo "  After: $(codesign -dv "$fw" 2>&1 | grep TeamIdentifier || echo 'unsigned')"
          done

      - name: Build archive
        run: |
          xcodebuild \
            -workspace ios/Spectrum.xcworkspace \
            -scheme Spectrum \
            -configuration Release \
            -archivePath /tmp/Spectrum.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=28KLUG5WLQ \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROFILE_NAME }}" \
            ENABLE_SIGNATURE_AGGREGATION=NO \
            archive

      - name: Export IPA
        run: |
          /usr/libexec/PlistBuddy -c "Add :method string app-store"           /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string 28KLUG5WLQ"           /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual"          /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string 'Apple Distribution'" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict"           /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:org.reactApp.spectrum string '${{ secrets.IOS_PROFILE_NAME }}'" /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath /tmp/Spectrum.xcarchive \
            -exportPath /tmp/SpectrumIPA \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # Submits to App Store Connect — goes through Apple review before going live
      - name: Upload to App Store
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          xcrun altool \
            --upload-app \
            --type ios \
            --file /tmp/SpectrumIPA/Spectrum.ipa \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" \
            --verbose
